<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0d0d0f"/>
  <!-- city skyline -->
  <g fill="#c8f04a">
    <rect x="2"  y="18" width="4"  height="11" rx="0.5" opacity="0.7"/>
    <rect x="7"  y="14" width="4"  height="15" rx="0.5" opacity="0.85"/>
    <rect x="12" y="10" width="5"  height="19" rx="0.5"/>
    <rect x="18" y="13" width="4"  height="16" rx="0.5" opacity="0.9"/>
    <rect x="23" y="17" width="4"  height="12" rx="0.5" opacity="0.75"/>
    <rect x="28" y="20" width="3"  height="9"  rx="0.5" opacity="0.6"/>
  </g>
  <!-- antenna -->
  <line x1="14.5" y1="10" x2="14.5" y2="5" stroke="#c8f04a" stroke-width="1"/>
  <!-- node -->
  <circle cx="14.5" cy="4" r="2" fill="#c8f04a"/>
  <!-- node ring -->
  <circle cx="14.5" cy="4" r="3.5" stroke="#c8f04a" stroke-width="0.7" opacity="0.4"/>
  <!-- ground -->
  <line x1="1" y1="29" x2="31" y2="29" stroke="#c8f04a" stroke-width="0.8" opacity="0.3"/>
</svg>
