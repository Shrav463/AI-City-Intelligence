<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- City skyline -->
  <g fill="#c8f04a">
    <rect x="3"  y="28" width="5"  height="16" rx="0.5" opacity="0.7"/>
    <rect x="9"  y="22" width="6"  height="22" rx="0.5" opacity="0.85"/>
    <rect x="16" y="16" width="7"  height="28" rx="0.5"/>
    <rect x="24" y="20" width="6"  height="24" rx="0.5" opacity="0.9"/>
    <rect x="31" y="26" width="6"  height="18" rx="0.5" opacity="0.75"/>
    <rect x="38" y="30" width="5"  height="14" rx="0.5" opacity="0.6"/>
  </g>

  <!-- Antenna on tallest building -->
  <line x1="19.5" y1="16" x2="19.5" y2="8" stroke="#c8f04a" stroke-width="1.2"/>

  <!-- Neural node at antenna tip -->
  <circle cx="19.5" cy="7" r="2.5" fill="#c8f04a"/>
  <!-- pulse ring -->
  <circle cx="19.5" cy="7" r="4.5" stroke="#c8f04a" stroke-width="0.8" opacity="0.4"/>

  <!-- Side nodes -->
  <circle cx="6"  cy="20" r="2" fill="#c8f04a" opacity="0.6"/>
  <circle cx="41" cy="21" r="2" fill="#c8f04a" opacity="0.6"/>

  <!-- Connection lines -->
  <line x1="19.5" y1="7" x2="6"  y2="20" stroke="#c8f04a" stroke-width="0.8" opacity="0.35"/>
  <line x1="19.5" y1="7" x2="41" y2="21" stroke="#c8f04a" stroke-width="0.8" opacity="0.35"/>

  <!-- Ground line -->
  <line x1="2" y1="44" x2="46" y2="44" stroke="#c8f04a" stroke-width="0.8" opacity="0.3"/>
</svg>
